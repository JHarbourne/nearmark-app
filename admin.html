<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <script>
    // Canonical host: bounce www → apex in a normal browser tab, even if a cached
    // service worker on the www origin served this shell before the server's 308.
    // Installed PWAs (standalone) are left alone – reinstall those from the apex.
    (function () {
      try {
        if (location.hostname.slice(0, 4) === 'www.' && !matchMedia('(display-mode: standalone)').matches) {
          location.replace(location.protocol + '//' + location.hostname.slice(4) + location.pathname + location.search + location.hash)
        }
      } catch (e) { /* never block boot */ }
    })()
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin · Nearmark</title>
  <link rel="icon" type="image/png" href="/favicon-48.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&display=swap"
    rel="stylesheet"
  />
</head>
<body>
  <div id="admin"></div>
  <script type="module" src="/src/admin/main.js"></script>
</body>
</html>
